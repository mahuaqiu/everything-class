<h2>界面布局方案</h2>
<p class="subtitle">选择你最喜欢的布局方式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>纯列表模式</h3>
      <p>最简洁：顶部搜索框 + 结果列表，像Everything一样极简</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>列表 + 详情面板</h3>
      <p>左侧列表，右侧显示选中窗口的详细信息（Handle、Class、标题、PID等）</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>列表 + 树形视图（可切换）</h3>
      <p>默认列表模式，切换按钮可进入树形层级视图查看子窗口</p>
    </div>
  </div>
</div>
